<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0f0f23, #1a1a2e);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', cursive;
  overflow: hidden;
}

#container {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  background: transparent;
  border-radius: 15px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  display: block;
  touch-action: none;
}

/* UI TEXT */

.ui {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  text-align: center;
  pointer-events: none;
  font-family: 'Press Start 2P', cursive;

  text-shadow: 
    4px 4px 0px #000,
    -2px -2px 0 #000,
    2px -2px 0 #000,
    -2px 2px 0 #000,
    1px 1px 0 #000,
    -1px -1px 0 #000;

  line-height: 1.1;
  white-space: normal;
}

#score {
  top: 10px;
  font-size: 24px;
  z-index: 10;
}

#highscore {
  top: 45px;
  font-size: 14px;
  opacity: 0.92;
  z-index: 10;
}

/* GAME OVER */

#gameover {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  font-size: 20px;
  display: none;
  max-width: 85vw;

  line-height: 1.5;
  padding: 20px 16px;

  background: rgba(0,0,0,0.7);
  border-radius: 12px;
  border: 3px solid #fff;

  z-index: 20;
}

/* MENU */

#menu {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 60px;

  width: 92%;
  max-width: 300px;

  z-index: 15;
}

/* TITLE */

#menutitle {
  font-size: 28px;
  text-align: center;
  color: white;
  margin-bottom: 40px;

  text-shadow:
    5px 5px 0px #000,
    -3px -3px 0 #000;
}

/* BUTTON GROUP */

.diff-buttons {
  display: flex;
  flex-direction: column;
  gap: 20px;
  align-items: center;

  width: 100%;
}

/* BUTTON */

.diff-btn {
  width: 100%;
  max-width: 260px;
  height: 70px;

  font-family: 'Press Start 2P', cursive;
  font-size: 18px;

  border: 4px solid #fff;
  background: rgba(0,0,0,0.6);
  color: #fff;

  cursor: pointer;

  transition: all 0.25s ease;

  border-radius: 12px;

  box-shadow: 0 8px 20px rgba(0,0,0,0.5);

  display: flex;
  align-items: center;
  justify-content: center;
}

.diff-btn:hover {
  transform: translateY(-4px) scale(1.03);
  box-shadow: 0 12px 25px rgba(0,0,0,0.7);
}

/* EASY */

.easy {
  border-color: #4CAF50;
  background: rgba(76,175,80,0.3);
}

.easy:hover {
  background: rgba(76,175,80,0.5);
}

/* MEDIUM */

.medium {
  border-color: #FF9800;
  background: rgba(255,152,0,0.3);
}

.medium:hover {
  background: rgba(255,152,0,0.5);
}

/* HARD */

.hard {
  border-color: #F44336;
  background: rgba(244,67,54,0.3);
}

.hard:hover {
  background: rgba(244,67,54,0.5);
}

/* SELECTED STATE */

.selected.easy {
  background: rgba(76,175,80,0.65);
  border-color: #388E3C;
  box-shadow: 0 10px 30px rgba(76,175,80,0.6);
}

.selected.medium {
  background: rgba(255,152,0,0.65);
  border-color: #F57C00;
  box-shadow: 0 10px 30px rgba(255,152,0,0.6);
}

.selected.hard {
  background: rgba(244,67,54,0.65);
  border-color: #D32F2F;
  box-shadow: 0 10px 30px rgba(244,67,54,0.6);
}

/* MOBILE */

@media (max-width: 768px), (orientation: portrait) {

  #score {
    top: 8px;
    font-size: 20px;
  }

  #highscore {
    top: 38px;
    font-size: 13px;
  }

  #menutitle {
    font-size: 24px;
  }

  .diff-buttons {
    gap: 16px;
  }

  .diff-btn {
    height: 65px;
    font-size: 16px;
  }

  #gameover {
    font-size: 18px;
    padding: 16px 12px;
  }
}</style>
</head>

<body>

<div id="container">
  <canvas id="game"></canvas>

  <div id="score" class="ui">Score: 0</div>
  <div id="highscore" class="ui">High Score: 0</div>

  <div id="menu">
    <div id="menutitle">FLAPPY BIRD</div>

    <div class="diff-buttons">
      <button id="easybtn" class="diff-btn easy selected">EASY</button>
      <button id="medbtn" class="diff-btn medium">MEDIUM</button>
      <button id="hardbtn" class="diff-btn hard">HARD</button>
    </div>

  </div>

  <div id="gameover" class="ui"></div>
</div>

</body>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let scoreText = document.getElementById("score");
let highText = document.getElementById("highscore");
let menu = document.getElementById("menu");
let overText = document.getElementById("gameover");

let W, H;
let gap, pipeWidth, margin, gravity, jumpPower, speed, pipeSpacing, cloudSpeed, scaleX, scaleY;
let bird = { x: 0, y: 0, size: 0, vel: 0 };
let pipes = [];
let clouds = [];
let score = 0;
let highScore = parseInt(localStorage.getItem("flappyHighScore")) || 0;
let difficulty = localStorage.getItem("flappyDifficulty") || "easy";
let state = "menu";

highText.innerHTML = "High Score: " + highScore;

const difficulties = {
  easy:   { gap: 0.32, spacing: 320, speed: 3.2, gravity: 0.60 },
  medium: { gap: 0.26, spacing: 260, speed: 4.0, gravity: 0.70 },
  hard:   { gap: 0.22, spacing: 220, speed: 5.0, gravity: 0.85 }
};

let diffBtns = {
  easy:   document.getElementById("easybtn"),
  medium: document.getElementById("medbtn"),
  hard:   document.getElementById("hardbtn")
};

function selectDifficulty(d) {
  difficulty = d;
  localStorage.setItem("flappyDifficulty", d);
  
  Object.keys(diffBtns).forEach(dd => {
    diffBtns[dd].classList.toggle("selected", dd === d);
  });
  
  menu.style.display = "none";
  state = "ready";
  
  resize();
  resetToReady();
}

function initDifficulty() {
  Object.keys(diffBtns).forEach(d => {
    diffBtns[d].addEventListener("click", () => selectDifficulty(d));
  });
  
  Object.keys(diffBtns).forEach(dd => {
    diffBtns[dd].classList.toggle("selected", dd === difficulty);
  });
  
  resize();
}

function resize() {
  let isPortrait = window.innerWidth < window.innerHeight;
  
  if (!isPortrait) {
    W = Math.min(850, window.innerWidth * 0.95);
    H = 480;
  } else {
    W = 420;
    H = Math.min(650, window.innerHeight * 0.95);
  }

  canvas.width = W;
  canvas.height = H;

  scaleX = W / 800;
  scaleY = H / 450;

  let diff = difficulties[difficulty];
  
  gap = H * diff.gap;
  pipeWidth = W * 0.08;
  pipeSpacing = diff.spacing * scaleX;
  speed = diff.speed * scaleX;
  gravity = diff.gravity * scaleY;
  jumpPower = 9 * scaleY;
  cloudSpeed = 1.2 * scaleX;
  margin = 55 * scaleY;
  
  bird.size = 22 * scaleY;
  bird.x = 130 * scaleX;
  
  if (isPortrait) {
    gap *= 1.12;
    pipeSpacing *= 1.08;
    speed *= 0.94;
    margin *= 1.05;
  }
}

resize();
window.addEventListener("resize", resize);

function spawnPipe() {
  let top = Math.random() * (H - gap - margin * 2) + margin;
  pipes.push({ x: W, top, bottom: top + gap, passed: false });
}

function spawnCloud() {
  clouds.push({
    x: W + Math.random() * 150,
    y: margin + Math.random() * (H * 0.25),
    size: (25 + Math.random() * 20) * scaleY
  });
}

function resetToReady() {
  bird.y = H / 2;
  bird.vel = 0;
  pipes = [];
  clouds = [];
  score = 0;
  scoreText.innerHTML = "Score: 0";
  overText.style.display = "none";

  for (let i = 0; i < 5; i++) spawnCloud();
}

function restartSameDifficulty() {
  state = "ready";
  resize();           // pastikan parameter sesuai difficulty saat ini
  resetToReady();
}

function enterPrestart() {
  state = "prestart";
}

function startGame() {
  state = "play";
  bird.vel = -jumpPower;
  spawnPipe();
}

function update() {
  if (state !== "play") return;

  bird.vel += gravity;
  bird.y += bird.vel;

  if (bird.y - bird.size < 0 || bird.y + bird.size > H) {
    gameOver();
    return;
  }

  pipes.forEach(p => {
    p.x -= speed;
    if (!p.passed && bird.x > p.x + pipeWidth) {
      score++;
      p.passed = true;
      scoreText.innerHTML = "Score: " + score;
    }
  });

  pipes = pipes.filter(p => p.x + pipeWidth > -20);

  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - pipeSpacing) {
    spawnPipe();
  }

  clouds.forEach(c => c.x -= cloudSpeed);
  clouds = clouds.filter(c => c.x + c.size * 2 > -100);
  if (clouds.length < 5) spawnCloud();

  checkCollision();
}

function checkCollision() {
  pipes.forEach(p => {
    if (
      bird.x + bird.size > p.x &&
      bird.x - bird.size < p.x + pipeWidth &&
      (bird.y - bird.size < p.top || bird.y + bird.size > p.bottom)
    ) {
      gameOver();
    }
  });
}

function gameOver() {
  state = "gameover";
  
  if (score > highScore) {
    highScore = score;
    localStorage.setItem("flappyHighScore", highScore);
    highText.innerHTML = "High Score: " + highScore;
  }

  overText.innerHTML = `
    GAME OVER!<br><br>
    Score: ${score}<br>
    High Score: ${highScore}<br><br>
    <strong>SPACE</strong> → main lagi (difficulty sama)<br><br>
    <strong>R</strong> → kembali ke menu
  `;
  overText.style.display = "block";
}

function draw() {
  let skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, "#7EC0EE");
  skyGrad.addColorStop(0.4, "#AEDFF7");
  skyGrad.addColorStop(0.7, "#E3F2FD");
  skyGrad.addColorStop(1, "#F0F8FF");
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  if (state !== "menu") {
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.shadowColor = "rgba(255,255,255,0.5)";
    ctx.shadowBlur = 10;
    clouds.forEach(c => {
      let s = c.size;
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.beginPath();
      ctx.arc(-s*0.6, -s*0.4, s*0.7, 0, Math.PI*2);
      ctx.arc(-s*0.1, -s*0.7, s*0.9, 0, Math.PI*2);
      ctx.arc(s*0.4, -s*0.4, s*0.6, 0, Math.PI*2);
      ctx.arc(0, s*0.2, s*0.8, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    ctx.shadowBlur = 0;
  }

  if (state === "play" || state === "gameover") {
    pipes.forEach(p => {
      let pipeGradT = ctx.createLinearGradient(p.x, 0, p.x + pipeWidth, 0);
      pipeGradT.addColorStop(0, "#4DB6AC");
      pipeGradT.addColorStop(0.5, "#26A69A");
      pipeGradT.addColorStop(1, "#00796B");
      ctx.fillStyle = pipeGradT;
      ctx.shadowColor = "rgba(0,0,0,0.3)";
      ctx.shadowBlur = 8;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 4;
      ctx.fillRect(p.x, 0, pipeWidth, p.top);

      ctx.fillStyle = "#66BB6A";
      ctx.fillRect(p.x - pipeWidth*0.25, p.top - pipeWidth*0.5, pipeWidth*1.5, pipeWidth*0.5);

      let pipeGradB = ctx.createLinearGradient(p.x, p.bottom, p.x + pipeWidth, p.bottom);
      pipeGradB.addColorStop(0, "#4DB6AC");
      pipeGradB.addColorStop(0.5, "#26A69A");
      pipeGradB.addColorStop(1, "#00796B");
      ctx.fillStyle = pipeGradB;
      ctx.fillRect(p.x, p.bottom, pipeWidth, H - p.bottom);

      ctx.fillStyle = "#66BB6A";
      ctx.fillRect(p.x - pipeWidth*0.25, p.bottom, pipeWidth*1.5, pipeWidth*0.5);
    });
    ctx.shadowBlur = 0;
  }

  if (state !== "menu") {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    let tilt = 0;
    if (state === "play" || state === "gameover") {
      tilt = Math.max(-Math.PI/3, Math.min(Math.PI/6, bird.vel * 0.12));
    }
    ctx.rotate(tilt);

    let birdGrad = ctx.createRadialGradient(0,0,0,0,0,bird.size);
    birdGrad.addColorStop(0, "#FFF176");
    birdGrad.addColorStop(0.7, "#FFEE58");
    birdGrad.addColorStop(1, "#FFEB3B");
    ctx.fillStyle = birdGrad;
    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.shadowBlur = 12;
    ctx.shadowOffsetX = 3;
    ctx.shadowOffsetY = 3;
    ctx.beginPath();
    ctx.arc(0, 0, bird.size, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FFF59D";
    ctx.beginPath();
    ctx.ellipse(bird.size*0.1, bird.size*0.4, bird.size*0.5, bird.size*0.3, Math.PI/4, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FFF";
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(bird.size*0.45, -bird.size*0.25, bird.size*0.28, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#212121";
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(bird.size*0.55, -bird.size*0.25, bird.size*0.14, 0, Math.PI*2);
    ctx.fill();

    ctx.fillStyle = "#FF8F00";
    ctx.shadowColor = "rgba(0,0,0,0.3)";
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.moveTo(bird.size*0.85, -0.1*bird.size);
    ctx.quadraticCurveTo(bird.size*1.3, 0, bird.size*0.85, 0.1*bird.size);
    ctx.quadraticCurveTo(bird.size*1.0, 0, bird.size*0.85, -0.1*bird.size);
    ctx.fill();

    ctx.restore();
  }

  if (state === "ready") {
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0, 0, W, H);

    ctx.font = `${Math.min(48 * scaleY, 48)}px 'Press Start 2P', cursive`;
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 10;

    ctx.fillText("PRESS", W/2, H/2 - 70*scaleY);
    ctx.fillText("SPACE", W/2, H/2 - 20*scaleY);
    ctx.fillText("TO START", W/2, H/2 + 40*scaleY);

    ctx.shadowBlur = 0;
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// Init
initDifficulty();
menu.style.display = "block";

// Controls
document.addEventListener("keydown", e => {
  e.preventDefault();
  
  if (e.code === "Space") {
    if (state === "play") {
      bird.vel = -jumpPower;
    } else if (state === "ready") {
      enterPrestart();
    } else if (state === "prestart") {
      startGame();
    } else if (state === "gameover") {
      restartSameDifficulty();   // ← tambahan: ulang game dengan difficulty sama
    }
  }
  
  if (e.key.toLowerCase() === "r" && state === "gameover") {
    menu.style.display = "block";
    state = "menu";
    overText.style.display = "none";
    pipes = [];
    clouds = [];
    initDifficulty();
  }
});

canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  
  if (state === "play") {
    bird.vel = -jumpPower;
  } else if (state === "ready") {
    enterPrestart();
  } else if (state === "prestart") {
    startGame();
  } else if (state === "gameover") {
    restartSameDifficulty();   // juga support touch untuk restart
  }
}, { passive: false });
</script>
</body>
</html>
